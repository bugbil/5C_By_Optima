<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5C - Digital Credit Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue-900: #001d3d;
  --blue-800: #003068;
  --blue-700: #003f88;
  --blue-600: #005baa;
  --blue-500: #0072d6;
  --blue-400: #3d9be9;
  --blue-100: #e8f1fb;
  --blue-50: #f0f6ff;
  --gold-500: #d4920a;
  --gold-400: #F5A623;
  --gold-300: #ffc655;
  --green-600: #059669;
  --green-500: #0a7c5c;
  --green-100: #d1fae5;
  --red-600: #dc2626;
  --red-500: #d0021b;
  --red-100: #fee2e2;
  --amber-600: #d97706;
  --amber-500: #c87000;
  --amber-100: #fef3c7;
  --gray-900: #0f172a;
  --gray-700: #334155;
  --gray-600: #475569;
  --gray-500: #64748b;
  --gray-400: #94a3b8;
  --gray-300: #cbd5e1;
  --gray-200: #e2e8f0;
  --gray-100: #f1f5f9;
  --gray-50: #f8fafc;
  --white: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow-sm: 0 1px 3px rgba(0,31,61,0.06);
  --shadow-md: 0 4px 16px rgba(0,31,61,0.08);
  --shadow-lg: 0 8px 32px rgba(0,31,61,0.12);
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; background: var(--gray-50); font-family: var(--font); color: var(--gray-900); }
input, button, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

.app-shell { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
@media (min-width: 768px) {
  .app-shell.logged-in { flex-direction: row; }
}

/* SIDEBAR */
.sidebar { display: none; }
@media (min-width: 768px) {
  .sidebar {
    display: flex; flex-direction: column; width: 260px; min-height: 100vh;
    background: linear-gradient(180deg, var(--blue-800) 0%, var(--blue-900) 100%);
    padding: 28px 20px; position: fixed; left: 0; top: 0; z-index: 100;
  }
  .sidebar .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .sidebar .brand-icon {
    width: 42px; height: 42px; border-radius: 10px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: #fff;
  }
  .sidebar .brand-text { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1.5px; }
  .sidebar .brand-sub { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; letter-spacing: 0.5px; }
  .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .sidebar-nav button {
    display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px;
    border: none; border-radius: var(--radius-md); background: transparent;
    color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; text-align: left;
  }
  .sidebar-nav button:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
  .sidebar-nav button.active { background: rgba(255,255,255,0.12); color: #fff; }
  .sidebar-nav button .nav-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; flex-shrink: 0;
  }
  .sidebar-nav button.active .nav-icon { background: rgba(255,255,255,0.15); }
  .sidebar-user {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px;
  }
  .sidebar-user .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--blue-500);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 14px;
  }
  .sidebar-user .uname { font-size: 12px; font-weight: 700; color: #fff; }
  .sidebar-user .ubranch { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 1px; }
  .main-content { margin-left: 260px; flex: 1; }
}

/* TOPBAR MOBILE */
.topbar-mobile {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: linear-gradient(135deg, var(--blue-800), var(--blue-900));
  position: sticky; top: 0; z-index: 50;
}
@media (min-width: 768px) { .topbar-mobile { display: none; } }
.brand-row { display: flex; align-items: center; gap: 10px; }
.brand-icon-sm {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.15); display: flex; align-items: center;
  justify-content: center; font-weight: 900; font-size: 11px; color: #fff;
}
.brand-label { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: 1px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 5px; }
.status-text { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; }

/* BOTTOM NAV MOBILE */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--gray-200);
  display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom);
}
@media (min-width: 768px) { .bottom-nav { display: none; } }
.bottom-nav button {
  flex: 1; border: none; background: none; padding: 10px 4px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--gray-400); font-size: 10px; font-weight: 600; cursor: pointer; transition: color 0.2s;
}
.bottom-nav button.active { color: var(--blue-600); }
.nav-dot {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.bottom-nav button.active .nav-dot { background: var(--blue-100); color: var(--blue-600); }
.nav-label { font-size: 10px; }

/* PAGE */
.page { padding: 20px 16px 100px; max-width: 900px; }
@media (min-width: 768px) { .page { padding: 32px 40px 60px; } }
.page-header { font-size: 20px; font-weight: 800; }
@media (min-width: 768px) { .page-header { font-size: 22px !important; } }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray-500); margin-bottom: 12px; }

/* CARD */
.card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px;
  position: relative; box-shadow: var(--shadow-sm);
}

/* FORM FIELD */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-500); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm); font-size: 13px; background: var(--white);
  color: var(--gray-900); outline: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue-400); }
.field input[readonly], .field input[disabled] { background: var(--gray-100); color: var(--gray-500); cursor: not-allowed; }
.field textarea { resize: vertical; min-height: 72px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .grid-3 { grid-template-columns: 1fr; } }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-green { background: var(--green-100); color: var(--green-600); }
.badge-blue { background: var(--blue-100); color: var(--blue-600); }
.badge-amber { background: var(--amber-100); color: var(--amber-600); }
.badge-red { background: var(--red-100); color: var(--red-600); }
.badge-gray { background: var(--gray-100); color: var(--gray-500); }

/* BUTTONS */
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius-md); border: none;
  background: linear-gradient(135deg, var(--blue-600), var(--blue-700));
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,63,136,0.35); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-gold {
  width: 100%; padding: 14px; border-radius: var(--radius-md); border: none;
  background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-gold:hover { transform: translateY(-1px); }
.btn-outline {
  width: 100%; padding: 12px; border-radius: var(--radius-md);
  border: 1.5px solid var(--blue-400); background: transparent;
  color: var(--blue-600); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 6px;
}
.btn-outline:hover { background: var(--blue-50); }

/* TABS */
.tabs { display: flex; gap: 6px; border-bottom: 2px solid var(--gray-100); margin-bottom: 16px; overflow-x: auto; }
.tab-btn {
  padding: 8px 14px; border: none; background: none; font-size: 13px;
  font-weight: 600; color: var(--gray-400); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
}
.tab-btn.active { color: var(--blue-600); border-bottom-color: var(--blue-600); }

/* STEP */
.step-row { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; }
.step-dot {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.05)} }
.step-dot.done { background: var(--green-500); }
.step-dot.active { background: var(--blue-600); animation: pulse 1.2s infinite; }
.step-dot.pending { background: var(--gray-300); }
.step-text { font-size: 13px; padding-top: 4px; color: var(--gray-500); }
.step-text.done { color: var(--gray-700); font-weight: 600; }

/* 5C SECTION */
.c5-section { border-left: 3px solid var(--blue-500); padding-left: 12px; margin-bottom: 20px; }
.c5-section-title { font-size: 13px; font-weight: 800; color: var(--blue-700); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

/* RESULT BOX */
.result-box {
  background: var(--white); border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-md); padding: 14px; margin-bottom: 12px;
}
.result-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 4px; }
.result-value { font-size: 15px; font-weight: 800; }

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (max-width: 480px) { .stat-grid { grid-template-columns: 1fr; } }
.stat-card {
  background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-md);
  padding: 14px; cursor: pointer; transition: box-shadow 0.2s; position: relative; overflow: hidden;
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-val { font-size: 24px; font-weight: 900; margin-bottom: 2px; }
.stat-label { font-size: 11px; color: var(--gray-500); font-weight: 600; }

/* RECENT ITEM */
.recent-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background 0.15s;
}
.recent-item:hover { background: var(--gray-50); border-radius: var(--radius-sm); padding-left: 8px; }
.avatar-circle {
  width: 36px; height: 36px; border-radius: 50%; background: var(--blue-100);
  display: flex; align-items: center; justify-content: center;
  color: var(--blue-600); font-weight: 800; font-size: 14px; flex-shrink: 0;
}

/* APPROVAL SECTION */
.approval-card {
  background: var(--white); border: 2px solid var(--blue-200);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
}
.approval-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.approval-icon {
  width: 48px; height: 48px; border-radius: var(--radius-md);
  background: var(--blue-100); display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
}
.approval-name { font-size: 15px; font-weight: 700; }
.approval-role { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

/* INSIGHT ROW */
.insight-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--gray-100); }
.insight-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.insight-text { font-size: 12px; line-height: 1.6; }

/* DSR METER */
.dsr-bar { height: 8px; border-radius: 4px; background: var(--gray-200); overflow: hidden; margin-top: 6px; }
.dsr-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; }
@media (min-width: 768px) { .modal-overlay { align-items: center; justify-content: center; } }
.modal-panel {
  background: var(--white); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px;
}
@media (min-width: 768px) { .modal-panel { border-radius: var(--radius-xl); max-width: 560px; max-height: 70vh; } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-close { border: none; background: var(--gray-100); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; }

/* LOGIN SCREEN */
.login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--blue-900) 0%, var(--blue-700) 60%, var(--blue-500) 100%);
  position: relative; overflow: hidden;
}
.login-grid-overlay {
  position: absolute; inset: 0; opacity: 0.04;
  background-image: linear-gradient(var(--white) 1px, transparent 1px), linear-gradient(90deg, var(--white) 1px, transparent 1px);
  background-size: 40px 40px;
}
.login-glow {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,114,214,0.3) 0%, transparent 70%);
  top: -100px; right: -100px;
}
.login-container { position: relative; z-index: 10; width: 100%; max-width: 400px; padding: 24px; }
.login-brand { text-align: center; margin-bottom: 32px; }
.login-brand-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 8px; }
.login-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px; color: #fff;
}
.login-title { font-size: 32px; font-weight: 900; color: #fff; letter-spacing: 2px; }
.login-subtitle { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; font-weight: 600; }
.login-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius-xl); padding: 24px; backdrop-filter: blur(10px); }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.login-field input {
  width: 100%; padding: 12px 14px; border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-md); font-size: 14px; background: rgba(255,255,255,0.08);
  color: #fff; outline: none; transition: border-color 0.2s;
}
.login-field input::placeholder { color: rgba(255,255,255,0.3); }
.login-field input:focus { border-color: rgba(255,255,255,0.4); }
.login-btn {
  width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
  color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; letter-spacing: 1px;
  transition: all 0.2s; margin-top: 4px;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 32px rgba(0,91,170,0.5); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* 5C SPECIFIC STYLES */
.c5-header {
  background: linear-gradient(135deg, var(--blue-700), var(--blue-900));
  border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; color: #fff;
}
.c5-header-title { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
.c5-header-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 3px; }
.c5-header-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }
.c5-header-meta { font-size: 11px; color: rgba(255,255,255,0.7); }
.c5-header-meta strong { color: #fff; font-weight: 700; }

.parameter-row {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
}
.parameter-label { font-size: 12px; font-weight: 600; color: var(--gray-700); flex: 1; min-width: 0; }
.parameter-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

.score-ring {
  width: 80px; height: 80px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 4px solid var(--gray-200); flex-shrink: 0;
}
.score-ring.good { border-color: var(--green-500); background: var(--green-100); }
.score-ring.warning { border-color: var(--amber-500); background: var(--amber-100); }
.score-ring.bad { border-color: var(--red-500); background: var(--red-100); }
.score-num { font-size: 20px; font-weight: 900; }
.score-label { font-size: 9px; font-weight: 700; text-transform: uppercase; }

.approval-flow {
  display: flex; align-items: center; gap: 8px; padding: 10px 0; flex-wrap: wrap;
}
.flow-node {
  background: var(--gray-100); border-radius: var(--radius-sm); padding: 6px 12px;
  font-size: 11px; font-weight: 700; color: var(--gray-600);
}
.flow-node.done { background: var(--green-100); color: var(--green-600); }
.flow-node.current { background: var(--blue-100); color: var(--blue-700); border: 1.5px solid var(--blue-400); }
.flow-arrow { color: var(--gray-400); font-size: 14px; }

/* EDITABLE FIELD */
.editable-field {
  display: flex; align-items: flex-start; gap: 8px; width: 100%;
}
.editable-field .ef-value { flex: 1; font-size: 12px; color: var(--gray-700); line-height: 1.6; min-height: 20px; }
.editable-field .ef-input {
  flex: 1; padding: 6px 10px; border: 1.5px solid var(--blue-400); border-radius: var(--radius-sm);
  font-size: 12px; font-family: inherit; color: var(--gray-900); outline: none; background: var(--blue-50);
  min-height: 32px; resize: vertical;
}
.edit-btn {
  padding: 3px 8px; border: 1px solid var(--gray-300); border-radius: 4px;
  background: var(--white); color: var(--gray-500); font-size: 10px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0; white-space: nowrap;
}
.edit-btn:hover { border-color: var(--blue-400); color: var(--blue-600); background: var(--blue-50); }
.edit-btn.save { border-color: var(--green-500); color: var(--green-600); background: var(--green-100); }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
@media (min-width: 600px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
.kpi-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 12px 14px; }
.kpi-val { font-size: 17px; font-weight: 800; }
.kpi-label { font-size: 10px; color: var(--gray-500); margin-top: 2px; font-weight: 600; }
</style>
</head>

<div id="root"></div>

<script type="text/babel" data-type="module">
import React, { StrictMode, useState, useEffect, createContext, useContext } from 'react';
import { createRoot } from 'react-dom/client';

function formatRp(val) {
  return "Rp " + Math.abs(val).toLocaleString("id-ID");

/* ================================================================
   EDITABLE FIELD COMPONENT
   ================================================================ */
function EditableField({ value, onChange, multiline }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);

  function handleSave() {
    onChange(draft);
    setEditing(false);
  }
  function handleCancel() {
    setDraft(value);
    setEditing(false);
  }

  if (editing) {
    return (
      <div className="editable-field" style={{ marginTop: 6 }}>
        {multiline ? (
          <textarea className="ef-input" value={draft} onChange={e => setDraft(e.target.value)} rows={3} autoFocus />
        ) : (
          <input className="ef-input" value={draft} onChange={e => setDraft(e.target.value)} autoFocus onKeyDown={e => e.key === "Enter" && handleSave()} />
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <button className="edit-btn save" onClick={handleSave}>Simpan</button>
          <button className="edit-btn" onClick={handleCancel}>Batal</button>
        </div>
      </div>
    );
  }

  return (
    <div className="editable-field" style={{ marginTop: 6 }}>
      <div className="ef-value" style={{ whiteSpace: "pre-wrap" }}>{value || "-"}</div>
      <button className="edit-btn" onClick={() => { setDraft(value); setEditing(true); }}>Edit</button>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [loading, setLoading] = useState(false);
  const [dots, setDots] = useState(0);
  const [nip, setNip] = useState("20180605");
  const [pass, setPass] = useState("password123");
  useEffect(() => {
    const iv = setInterval(() => setDots(d => (d + 1) % 4), 400);
    return () => clearInterval(iv);
  }, []);
  function handleLogin() {
    setLoading(true);
    setTimeout(() => { setLoading(false); onLogin(); }, 1800);
  }
  return (
    <div className="login-screen">
      <div className="login-grid-overlay" />
      <div className="login-glow" />
      <div className="login-container">
        <div className="login-brand">
          <div className="login-brand-row">
            <div className="login-icon">5C</div>
            <div style={{ textAlign: "left" }}>
              <div className="login-title" style={{ fontSize: 26 }}>5C Digital</div>
              <div className="login-subtitle">BY TIM OPTIMA</div>
            </div>
          </div>
        </div>
        <div className="login-card">
          <div className="login-field">
            <label>User ID / NIP</label>
            <input value={nip} onChange={e => setNip(e.target.value)} placeholder="Masukkan NIP" />
          </div>
          <div className="login-field">
            <label>Password</label>
            <input value={pass} onChange={e => setPass(e.target.value)} type="password" placeholder="Masukkan password" />
          </div>
          <button className="login-btn" onClick={handleLogin} disabled={loading}>
            {loading ? "MENGAUTENTIKASI" + ".".repeat(dots) : "MASUK"}
          </button>
        </div>
      </div>
    </div>
  );
}

      {activeModal && (
        <div className="modal-overlay" onClick={() => setActiveModal(null)}>
          <div className="modal-panel" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div style={{ fontSize: 17, fontWeight: 800 }}>{activeModal.label.replace("\n", " ")}</div>

              <div style={{ display: "grid", gridTemplateColumns: "80px 70px 1fr 110px 90px", gap: 8, padding: "8px 0", borderBottom: "2px solid var(--gray-200)", fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", letterSpacing: 0.5 }}>

                <div key={i}

                    setActiveModal(null);
                    onSelectAplikasi(item);

                  style={{ display: "grid", gridTemplateColumns: "80px 70px 1fr 110px 90px", gap: 8, padding: "10px 0", borderBottom: "1px solid var(--gray-100)", cursor: "pointer", alignItems: "center", fontSize: 12, transition: "background 0.15s" }}

                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div style={{ fontWeight: 600, color: "var(--blue-600)", fontSize: 11 }}>{item.id}</div>
                  <div style={{ fontSize: 11, color: "var(--gray-600)" }}>{item.mid}</div>
                  <div style={{ fontWeight: 600 }}>{item.name}</div>
                  <div style={{ fontSize: 11, color: "var(--gray-600)" }}>{item.prod}</div>
                  <div>
                    {item.status === "oneme" ? (
                      <span className="badge badge-blue" style={{ fontSize: 9 }}>
                        {ONE_ME_STATUS_MAP[item.engine] || "Save BM"}

                      <span className={`badge ${item.status === "selesai" ? "badge-green" : item.status === "butuh_rm" ? "badge-amber" : "badge-amber"}`} style={{ fontSize: 9 }}>

            <div style={{ position: "absolute", top: 0, left: 0, width: 4, height: "100%", borderRadius: "4px 0 0 4px", background: s.barColor }} />

          </span>
        </div>
      ))}
    </div>
  );

function Generate5CScreen({ onNavigate, onGenerated }) {
  const currentUser = useContext(UserContext);
  const defaultCabang = currentUser.branches[0];
  const NAMES = ["Andi Pratama", "Dedi Kurniawan", "Sinta Dewi", "Agung Saputra", "Mega Puspita", "Riko Firmansyah", "Lia Andriani", "Bayu Nugroho", "Fitri Rahayu", "Wahyu Santoso"];
  const ENGINES = ["REGULER 1", "REGULER 2", "APPROVE 1", "APPROVE 2", "REJECT 1"];
  const [form, setForm] = useState(() => ({
    name: NAMES[Math.floor(Math.random() * NAMES.length)],
    appId: randAPP(), mid: randMID(), cabang: defaultCabang,
    engine: "REGULER 1", produk: PRODUK_LIST[0], tgl: new Date().toISOString().split("T")[0]
  }));
  const set = k => v => setForm(f => ({ ...f, [k]: v }));
  const [step, setStep] = useState(null);
  const STEPS = ["Membaca data konsumen dari ONE ME", "Kalkulasi DSR dan kapasitas kredit", "Generating Form 5C Digital"];
  useEffect(() => {
    if (step !== null && step < STEPS.length) {
      const t = setTimeout(() => setStep(s => s + 1), 900);
      return () => clearTimeout(t);
    }
  }, [step]);
  const done = step !== null && step >= STEPS.length;

  // Simulate a realistic generated aplikasi matching the full DB structure
  function buildGeneratedAplikasi() {
    const dsr = 28 + Math.floor(Math.random() * 15);
    const penghasilan = 8000000 + Math.floor(Math.random() * 12000000);
    const angsuran = Math.round(penghasilan * dsr / 100);
    const ph = Math.round(penghasilan * 20);
    const cmoList = ["Susi Susanti", "Agus Prabowo", "Rina Kartika", "Doni Hermawan", "Benny Tan"];
    const cmo = cmoList[Math.floor(Math.random() * cmoList.length)];
    return {
      id: form.appId, mid: form.mid,
      name: form.name || "Konsumen Baru",
      prod: form.produk, cabang: form.cabang,
      status: "menunggu_bm", tgl: form.tgl,
      cmo, engine: form.engine, ph,
      karakter: {
        survey: "Baik - Rumah milik sendiri, konsumen kooperatif, tidak ada indikasi konsumen atas nama/fiktif",
        histori_ybs: "Data SLIK diambil dari ONE ME — tidak ada catatan tunggak",
        histori_pasangan: "-",
        jejak: "Tidak ada tag negatif di GetContact, profil media sosial bersih",
        lainnya_char: "-"
      },
      colateral: {
        kesesuaian: "Sesuai dengan profil konsumen berdasarkan data ONE ME",
        dp_otr: "DP sesuai ketentuan, tidak ada indikasi upping",
        unit: "-",
        bpkb: "an. " + (form.name || "Konsumen Baru"),
        lainnya_col: "-"
      },
      kapasitas: {
        dsr, total_angsuran: angsuran, total_penghasilan: penghasilan,
        lama_kerja: "Data dari ONE ME — Karyawan Tetap",
        fasilitas_aktif: { ybs: 1, pasangan: 0 },
        slik_ybs: "Data SLIK diambil otomatis dari ONE ME",
        slik_pasangan: "-",
        fasilitas_besar: { ybs: 1, pasangan: 0 },
        slik_besar_ybs: "Data SLIK diambil otomatis dari ONE ME",
        slik_besar_pasangan: "-",
        pernah_restruktur: "Tidak pernah",
        pendapatan_lain: "-",
        lainnya_cap: "-",
        saldo: {
          kredit: Math.round(penghasilan * 1.2),
          debit: Math.round(penghasilan * 1.05),
          avg: Math.round(penghasilan * 0.6),
          akhir: Math.round(penghasilan * 0.5)
        }
      },
      kondisi: {
        sektor: "Tidak Berisiko Tinggi",
        sektor_desc: "Data sektor pekerjaan diambil dari ONE ME — stabil",
        pekerjaan: "Tidak Berisiko Tinggi",
        status_kerja: "Karyawan Tetap",
        usaha_lain: "-",
        lainnya_cond: "-"
      },
      modal: {
        rumah: "Data kepemilikan dari ONE ME",
        kendaraan: "-",
        sumber_dana: "Gaji bulanan",
        lainnya_modal: "-"
      },
      kesimpulan: `1. DSR ${dsr}% ${dsr <= 33 ? "sangat aman" : dsr <= 40 ? "dalam batas aman" : "melebihi batas, perlu perhatian"}\n2. Data SLIK dan mutasi rekening sudah diverifikasi dari ONE ME\n3. Karakter konsumen baik berdasarkan jejak digital`,
      rekomendasi: dsr <= 40 ? "SETUJU" : "PERTIMBANGAN KHUSUS",
      bm_setuju: null,
      rm_required: form.engine === "APPROVE 1" || form.engine === "APPROVE 2"
    };
  }

  if (step !== null) return (
    <div className="page">
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 20, fontWeight: 800 }} className="page-header">Generate Form 5C</div>
        <div style={{ fontSize: 12, color: "var(--gray-500)", marginTop: 3 }}>AI sedang memproses data konsumen</div>
      </div>
      <div className="card" style={{ display: "flex", gap: 14, alignItems: "center" }}>
        <div style={{ width: 44, height: 44, borderRadius: "var(--radius-md)", background: "var(--blue-100)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, color: "var(--blue-600)", flexShrink: 0 }}>5C</div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>{form.name || "Konsumen Baru"}</div>
          <div style={{ fontSize: 11, color: "var(--gray-500)" }}>{form.appId} · {form.produk} · {form.cabang}</div>
        </div>
      </div>
      <div className="card">
        <div className="section-label">Proses Generate AI</div>
        {STEPS.map((s, i) => (
          <div key={i} className="step-row">
            <div className={`step-dot ${i < step ? "done" : i === step ? "active" : "pending"}`}>{i < step ? "✓" : i + 1}</div>
            <div className={`step-text ${i < step ? "done" : ""}`}>{s}</div>
          </div>
        ))}
      </div>
      {done && (
        <>
          <div style={{ background: "var(--green-100)", border: "1px solid #a7f3d0", borderRadius: "var(--radius-md)", padding: 14, marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--green-600)" }}>✓ FORM 5C BERHASIL DIGENERATE</div>
            <div style={{ fontSize: 12, color: "var(--gray-600)", marginTop: 4 }}>Form 5C Digital siap untuk direview dan disetujui oleh BM.</div>
          </div>
          <button className="btn-primary" onClick={() => onGenerated && onGenerated(buildGeneratedAplikasi())}>
            Lihat dan Approve form 5C
          </button>
        </>
      )}
    </div>
  );

  return (
    <div className="page">
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 20, fontWeight: 800 }} className="page-header">Generate Form 5C</div>
        <div style={{ fontSize: 12, color: "var(--gray-500)", marginTop: 3 }}>Input data akan diambil otomatis dari ONE ME</div>
      </div>
      <div className="card">
        <div className="section-label">Data Aplikasi (dari ONE ME)</div>
        <div className="field"><label>Nama Konsumen</label><input value={form.name} onChange={e => set("name")(e.target.value)} placeholder="Masukkan nama konsumen" /></div>
        <div className="grid-2">
          <div className="field"><label>APP ID</label><input value={form.appId} onChange={e => set("appId")(e.target.value)} placeholder="5xxxxxxx" /></div>
          <div className="field"><label>MID</label><input value={form.mid} onChange={e => set("mid")(e.target.value)} placeholder="7xxxxxxx" /></div>
        </div>
        <div className="field"><label>Tanggal Pengajuan</label><input type="date" value={form.tgl} onChange={e => set("tgl")(e.target.value)} /></div>
        <div className="grid-2">
          <div className="field"><label>Produk</label>
            <select value={form.produk} onChange={e => set("produk")(e.target.value)}>
              {PRODUK_LIST.map(p => <option key={p}>{p}</option>)}
            </select>
          </div>
          <div className="field"><label>Engine Scoring</label>
            <select value={form.engine} onChange={e => set("engine")(e.target.value)}>
              {ENGINES.map(e => <option key={e}>{e}</option>)}
            </select>
          </div>
        </div>
        <div className="field"><label>Cabang</label>
          {currentUser.branches.length > 1 ? (
            <select value={form.cabang} onChange={e => set("cabang")(e.target.value)}>
              {currentUser.branches.map(b => <option key={b}>{b}</option>)}
            </select>
          ) : <input value={form.cabang} readOnly style={{ background: "var(--gray-100)" }} />}
        </div>
      </div>
      <div style={{ background: "var(--blue-50)", border: "1px solid var(--blue-100)", borderRadius: "var(--radius-md)", padding: 12, marginBottom: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "var(--blue-700)" }}>Data akan diambil otomatis dari ONE ME</div>
        <div style={{ fontSize: 11, color: "var(--gray-600)", marginTop: 4 }}>SLIK, mutasi rekening, histori kredit, dan data konsumen akan dianalisis AI secara otomatis.</div>
      </div>
      <button className="btn-primary" onClick={() => setStep(0)}>
        Generate Form 5C dengan AI
      </button>
    </div>
  );
}

/* ================================================================
   FORM 5C SCREEN - Matches Excel Form Analisa Kredit structure
   ================================================================ */
function Form5CScreen({ aplikasi }) {
  const currentUser = useContext(UserContext);
  const [data, setData] = useState(() => JSON.parse(JSON.stringify(aplikasi || {})));

  const a = data;
  if (!aplikasi) return (
    <div className="page">
      <div className="card" style={{ textAlign: "center", padding: 40, color: "var(--gray-400)" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
        <div style={{ fontSize: 14, fontWeight: 600 }}>Belum ada aplikasi dipilih</div>
        <div style={{ fontSize: 12, marginTop: 4 }}>Pilih aplikasi dari Dashboard atau generate baru</div>
      </div>
    </div>
  );

  function updateField(path, value) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
      obj[keys[keys.length - 1]] = value;
      return next;
    });
  }

  const dsrColor = a.kapasitas.dsr > 40 ? "var(--red-500)" : a.kapasitas.dsr > 33 ? "var(--amber-500)" : "var(--green-500)";

  return (
    <div>
      {/* Sticky header */}
      <div style={{ padding: "16px 20px 0", background: "var(--white)", borderBottom: "1px solid var(--gray-200)", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: 800 }}>Form 5C Digital</div>
              <div style={{ fontSize: 11, color: "var(--gray-500)" }}>{a.name} · {a.id} · {a.cabang}</div>
            </div>
            <span className="badge badge-blue">{a.engine}</span>
          </div>
        </div>
      </div>

      <div className="page" style={{ paddingTop: 18 }}>
        {/* HEADER CARD - matching Excel header */}
        <div className="c5-header">
          <div className="c5-header-row">
            <div>
              <div className="c5-header-title">FORM ANALISA KREDIT</div>
              <div className="c5-header-sub">PT BCA Finance · {a.cabang}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="c5-header-meta">Tanggal Pengajuan: <strong>{a.tgl}</strong></div>
              <div className="c5-header-meta">APP ID: <strong>{a.id}</strong></div>
              <div className="c5-header-meta">Engine: <strong>{a.engine}</strong></div>
            </div>
          </div>
          <div style={{ borderTop: "1px solid rgba(255,255,255,0.15)", marginTop: 12, paddingTop: 10, display: "flex", gap: 24, flexWrap: "wrap" }}>
            {[["Cabang", a.cabang], ["Nama CMO", a.cmo], ["Nama Konsumen", a.name], ["Produk", a.prod], ["PH", formatRp(a.ph)]].map(([l,v]) => (
              <div key={l}>
                <div className="c5-header-meta">{l}</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* TAB: 5C ANALISA - Following Excel structure exactly */}
        <>
            {/* ====== 1. CHARACTER ====== */}
            <div className="card">
              <div className="c5-section">
                <div className="c5-section-title">1. Character (Karakter)</div>
              </div>

              {/* Hasil Survey */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Hasil Survey</div>
                  <div className="parameter-desc">Kondisi rumah, karakter konsumen, kondisi usaha/pekerjaan, indikasi konsumen atas nama/fiktif</div>
                  <EditableField value={a.karakter.survey} onChange={v => updateField("karakter.survey", v)} multiline />
                </div>
              </div>

              {/* History Kredit */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">History Kredit</div>
                  <div className="parameter-desc">Pernah menunggak, frekuensi menunggak, WO, dll</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 8 }}>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", marginBottom: 4 }}>YBS</div>
                      <EditableField value={a.karakter.histori_ybs} onChange={v => updateField("karakter.histori_ybs", v)} multiline />
                    </div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", marginBottom: 4 }}>Pasangan</div>
                      <EditableField value={a.karakter.histori_pasangan} onChange={v => updateField("karakter.histori_pasangan", v)} multiline />
                    </div>
                  </div>
                </div>
              </div>

              {/* Jejak Digital */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Informasi Jejak Digital</div>
                  <div className="parameter-desc">Analisa profile dari social media, tag negatif di GetContact, ECN, komunitas</div>
                  <EditableField value={a.karakter.jejak} onChange={v => updateField("karakter.jejak", v)} multiline />
                </div>
              </div>

              {/* Lainnya */}
              <div className="parameter-row" style={{ borderBottom: "none" }}>
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Lainnya</div>
                  <div className="parameter-desc">Informasi tambahan lainnya</div>
                  <EditableField value={a.karakter.lainnya_char} onChange={v => updateField("karakter.lainnya_char", v)} />
                </div>
              </div>
            </div>

            {/* ====== 2. COLATERAL ====== */}
            <div className="card">
              <div className="c5-section">
                <div className="c5-section-title">2. Colateral (Jaminan)</div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Kesesuaian Profil Konsumen dengan Kendaraan</div>
                  <div className="parameter-desc">Apakah kendaraan yang diambil sesuai dengan profil konsumen</div>
                  <EditableField value={a.colateral.kesesuaian} onChange={v => updateField("colateral.kesesuaian", v)} multiline />
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">% DP / OTR</div>
                  <div className="parameter-desc">Apakah DP dan OTR sesuai (tidak ada indikasi upping, dll)</div>
                  <EditableField value={a.colateral.dp_otr} onChange={v => updateField("colateral.dp_otr", v)} multiline />
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                    <div>
                      <div className="parameter-label">Unit</div>
                      <EditableField value={a.colateral.unit} onChange={v => updateField("colateral.unit", v)} />
                    </div>
                    <div>
                      <div className="parameter-label">BPKB an.</div>
                      <EditableField value={a.colateral.bpkb} onChange={v => updateField("colateral.bpkb", v)} />
                    </div>
                  </div>
                </div>
              </div>

              <div className="parameter-row" style={{ borderBottom: "none" }}>
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Lainnya</div>
                  <EditableField value={a.colateral.lainnya_col} onChange={v => updateField("colateral.lainnya_col", v)} />
                </div>
              </div>
            </div>

            {/* ====== 3. CAPACITY ====== */}
            <div className="card">
              <div className="c5-section">
                <div className="c5-section-title">3. Capacity (Kapasitas)</div>
              </div>

              {/* DSR */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">DSR (Debt Service Ratio)</div>
                  <div className="parameter-desc">Rasio total angsuran terhadap total pendapatan</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 14, marginTop: 8 }}>
                    <div style={{ fontSize: 20, fontWeight: 900, color: dsrColor }}>{a.kapasitas.dsr}%</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 11, color: "var(--gray-500)" }}>
                        Total Angsuran: <strong>{formatRp(a.kapasitas.total_angsuran)}</strong> / Total Penghasilan: <strong>{formatRp(a.kapasitas.total_penghasilan)}</strong>
                      </div>
                      <div className="dsr-bar" style={{ marginTop: 6 }}><div className="dsr-fill" style={{ width: Math.min(a.kapasitas.dsr, 100) + "%", background: dsrColor }} /></div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Lama Bekerja */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Lama Bekerja</div>
                  <div className="parameter-desc">Lama konsumen bekerja</div>
                  <EditableField value={a.kapasitas.lama_kerja} onChange={v => updateField("kapasitas.lama_kerja", v)} />
                </div>
              </div>

              {/* Jumlah fasilitas kredit aktif (SLIK) */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Jumlah Fasilitas Kredit Aktif (SLIK)</div>
                  <div className="parameter-desc">Total fasilitas kredit yang sedang berjalan beserta jumlah outstandingnya</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 8 }}>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", marginBottom: 4 }}>YBS ({a.kapasitas.fasilitas_aktif.ybs})</div>
                      <EditableField value={a.kapasitas.slik_ybs} onChange={v => updateField("kapasitas.slik_ybs", v)} multiline />
                    </div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", marginBottom: 4 }}>Pasangan ({a.kapasitas.fasilitas_aktif.pasangan})</div>
                      <EditableField value={a.kapasitas.slik_pasangan} onChange={v => updateField("kapasitas.slik_pasangan", v)} multiline />
                    </div>
                  </div>
                </div>
              </div>

              {/* Jumlah fasilitas > 5 Juta */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Jumlah Fasilitas Kredit Aktif (SLIK) &gt; 5 Juta</div>
                  <div className="parameter-desc">Total fasilitas kredit berjalan dengan outstanding lebih dari 5 Juta</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 8 }}>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", marginBottom: 4 }}>YBS ({a.kapasitas.fasilitas_besar.ybs})</div>
                      <EditableField value={a.kapasitas.slik_besar_ybs} onChange={v => updateField("kapasitas.slik_besar_ybs", v)} multiline />
                    </div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "var(--gray-500)", textTransform: "uppercase", marginBottom: 4 }}>Pasangan ({a.kapasitas.fasilitas_besar.pasangan})</div>
                      <EditableField value={a.kapasitas.slik_besar_pasangan} onChange={v => updateField("kapasitas.slik_besar_pasangan", v)} multiline />
                    </div>
                  </div>
                </div>
              </div>

              {/* Pernah Restruktur */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Pernah Restruktur (SLIK)</div>
                  <div className="parameter-desc">Pernah/tidak pernah direstruktur pinjamannya selama 24 bulan terakhir</div>
                  <EditableField value={a.kapasitas.pernah_restruktur} onChange={v => updateField("kapasitas.pernah_restruktur", v)} />
                </div>
              </div>

              {/* Pendapatan Lainnya */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Pendapatan Konsumen Lainnya</div>
                  <div className="parameter-desc">Pendapatan dari usaha/pekerjaan lainnya</div>
                  <EditableField value={a.kapasitas.pendapatan_lain} onChange={v => updateField("kapasitas.pendapatan_lain", v)} />
                </div>
              </div>

              {/* Lainnya */}
              <div className="parameter-row" style={{ borderBottom: "none" }}>
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Lainnya</div>
                  <EditableField value={a.kapasitas.lainnya_cap} onChange={v => updateField("kapasitas.lainnya_cap", v)} />
                </div>
              </div>
            </div>

            {/* ====== 4. CAPITAL ====== */}
            <div className="card">
              <div className="c5-section">
                <div className="c5-section-title">4. Capital (Modal)</div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Kepemilikan Rumah dan Bukti</div>
                  <div className="parameter-desc">Rumah milik sendiri, kontrak, dll</div>
                  <EditableField value={a.modal.rumah} onChange={v => updateField("modal.rumah", v)} />
                </div>
              </div>

              {/* Rata-rata saldo mengendap */}
              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Rata-rata Saldo Mengendap</div>
                  <div className="parameter-desc">Perhitungan rata-rata saldo mengendap minimal 3 bulan terakhir</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 8 }}>
                    {[["Kredit", formatRp(a.kapasitas.saldo.kredit)], ["Debit", formatRp(a.kapasitas.saldo.debit)], ["Rata-rata Saldo Mengendap", formatRp(a.kapasitas.saldo.avg)], ["Saldo di Bulan Terakhir", formatRp(a.kapasitas.saldo.akhir)]].map(([l, v]) => (
                      <div key={l} style={{ padding: "8px 10px", background: "var(--gray-50)", borderRadius: "var(--radius-sm)", border: "1px solid var(--gray-100)" }}>
                        <div style={{ fontSize: 10, color: "var(--gray-500)", fontWeight: 700, textTransform: "uppercase" }}>{l}</div>
                        <div style={{ fontSize: 13, fontWeight: 700, marginTop: 2 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Kepemilikan Kendaraan Lainnya</div>
                  <div className="parameter-desc">Konsumen memiliki kendaraan lain / tidak, termasuk status kepemilikan</div>
                  <EditableField value={a.modal.kendaraan} onChange={v => updateField("modal.kendaraan", v)} />
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Sumber Dana</div>
                  <div className="parameter-desc">Informasi sumber dana pembayaran angsuran</div>
                  <EditableField value={a.modal.sumber_dana} onChange={v => updateField("modal.sumber_dana", v)} />
                </div>
              </div>

              <div className="parameter-row" style={{ borderBottom: "none" }}>
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Lainnya</div>
                  <EditableField value={a.modal.lainnya_modal} onChange={v => updateField("modal.lainnya_modal", v)} />
                </div>
              </div>
            </div>

            {/* ====== 5. CONDITION ====== */}
            <div className="card">
              <div className="c5-section">
                <div className="c5-section-title">5. Condition (Kondisi)</div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Sektor Ekonomi (Berisiko / Tidak)</div>
                  <div className="parameter-desc">Penilaian apakah sektor ekonomi tempat konsumen bekerja tergolong risiko tinggi</div>
                  <EditableField value={a.kondisi.sektor + " — " + a.kondisi.sektor_desc} onChange={v => updateField("kondisi.sektor_desc", v)} multiline />
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Pekerjaan</div>
                  <div className="parameter-desc">Pekerjaan/profesi konsumen dan apakah berisiko tinggi / tidak</div>
                  <EditableField value={a.kondisi.pekerjaan + " — " + a.kondisi.status_kerja} onChange={v => updateField("kondisi.status_kerja", v)} multiline />
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Status Kerja</div>
                  <div className="parameter-desc">Status kepegawaian (tetap, kontrak, harian lepas, pemilik usaha, dll)</div>
                  <EditableField value={a.kondisi.status_kerja} onChange={v => updateField("kondisi.status_kerja", v)} />
                </div>
              </div>

              <div className="parameter-row">
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Pekerja dan/atau Usaha Lainnya</div>
                  <div className="parameter-desc">Informasi jika konsumen memiliki usaha atau pekerjaan sampingan</div>
                  <EditableField value={a.kondisi.usaha_lain} onChange={v => updateField("kondisi.usaha_lain", v)} />
                </div>
              </div>

              <div className="parameter-row" style={{ borderBottom: "none" }}>
                <div style={{ flex: 1 }}>
                  <div className="parameter-label">Lainnya</div>
                  <EditableField value={a.kondisi.lainnya_cond} onChange={v => updateField("kondisi.lainnya_cond", v)} />
                </div>
              </div>
            </div>

            {/* ====== KESIMPULAN ====== */}
            <div className="card" style={{ borderColor: "var(--blue-200)" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: "var(--blue-700)", marginBottom: 8, textTransform: "uppercase" }}>
                Kesimpulan Hasil Analisa
              </div>
              <EditableField value={a.kesimpulan} onChange={v => updateField("kesimpulan", v)} multiline />
            </div>

            {/* ====== REKOMENDASI ====== */}
            <div className="card" style={{ borderColor: a.rekomendasi.includes("SETUJU") && !a.rekomendasi.includes("TIDAK") ? "#a7f3d0" : "#fde68a" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: a.rekomendasi.includes("SETUJU") && !a.rekomendasi.includes("TIDAK") ? "var(--green-600)" : "var(--amber-600)", marginBottom: 8, textTransform: "uppercase" }}>
                Rekomendasi Akhir BM
              </div>
              <EditableField value={a.rekomendasi} onChange={v => updateField("rekomendasi", v)} />
            </div>

            {/* KIRIM KE RM - hanya muncul jika engine = REGULER 2 */}
            {a.engine && a.engine.toUpperCase() === "REGULER 2" && (
              <KirimRMSection />
            )}

            {/* KIRIM 5C KE ONE ME - tombol final */}
            <Kirim5COneMEButton aplikasi={a} />
        </>
      </div>
    </div>
  );
}

/* ================================================================
   MAIN APP SHELL
   ================================================================ */
function App() {
  const [screen, setScreen] = useState("login");
  const [loggedIn, setLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(TEAM_USERS[0]);
  const [selectedAplikasi, setSelectedAplikasi] = useState(null);

  const NAV = [
    { id: "dashboard", label: "Dashboard", letter: "D" },
    { id: "generate", label: "Generate", letter: "G" },
  ];

  const activeNav = screen === "form5c" ? "dashboard" : screen;

  function handleLogin() {
    const usr = TEAM_USERS[Math.floor(Math.random() * TEAM_USERS.length)];
    setCurrentUser(usr);
    setLoggedIn(true);
    setScreen("dashboard");
  }

  function handleSelectAplikasi(a) {
    setSelectedAplikasi(a);
    setScreen("form5c");
  }

  function handleGenerated(generatedAplikasi) {
    if (generatedAplikasi) {
      setSelectedAplikasi(generatedAplikasi);
      setScreen("form5c");
    } else {
      setScreen("dashboard");
    }
  }

  function handleLogout() {
    setLoggedIn(false);
    setScreen("login");
    setSelectedAplikasi(null);
  }

  if (!loggedIn) return <LoginScreen onLogin={handleLogin} />;

  return (
    <UserContext.Provider value={currentUser}>
      <div className={`app-shell ${loggedIn ? "logged-in" : ""}`}>
        {/* SIDEBAR - Desktop */}
        <div className="sidebar">
          <div className="brand">
            <div className="brand-icon">5C</div>
            <div>
              <div className="brand-text" style={{ fontSize: 15, lineHeight: 1.2 }}>5C Digital Credit Summary</div>
              <div className="brand-sub">By Tim Optima</div>
            </div>
          </div>
          <div className="sidebar-nav">
            {NAV.map(n => (
              <button key={n.id} className={activeNav === n.id ? "active" : ""} onClick={() => { setScreen(n.id); if (n.id === "dashboard") setSelectedAplikasi(null); }}>
                <div className="nav-icon">{n.letter}</div>
                {n.label}
              </button>
            ))}
          </div>
          <div className="sidebar-user" style={{ flexDirection: "column", alignItems: "stretch", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div className="avatar">{currentUser.name[0]}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="uname">{currentUser.name}</div>
                <div className="ubranch">{currentUser.role} · {currentUser.branches[0]}</div>
              </div>
            </div>
            <button onClick={handleLogout} style={{ width: "100%", padding: "8px 12px", borderRadius: "var(--radius-sm)", border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.7)", fontSize: 11, fontWeight: 600, cursor: "pointer", transition: "all 0.2s", textAlign: "center" }}
              onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.12)"; e.currentTarget.style.color = "#fff"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.color = "rgba(255,255,255,0.7)"; }}>
              Logout
            </button>
          </div>
        </div>

        {/* TOPBAR - Mobile */}
        <div className="topbar-mobile">
          <div className="brand-row">
            <div className="brand-icon-sm">5C</div>
            <div className="brand-label">5C</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center" }}>
              <span className="status-dot" />
              <span className="status-text">Online</span>
            </div>
            <button onClick={handleLogout} style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 6, color: "#fff", fontSize: 10, fontWeight: 600, padding: "5px 10px", cursor: "pointer" }}>Logout</button>
          </div>
        </div>

        {/* MAIN CONTENT */}
        <div className="main-content">
          {screen === "dashboard" && <DashboardScreen onSelectAplikasi={handleSelectAplikasi} />}
          {screen === "generate" && <Generate5CScreen onNavigate={setScreen} onGenerated={handleGenerated} />}
          {screen === "form5c" && <Form5CScreen aplikasi={selectedAplikasi} />}
        </div>

        {/* BOTTOM NAV - Mobile */}
        <div className="bottom-nav">
          {NAV.map(n => (
            <button key={n.id} className={activeNav === n.id ? "active" : ""} onClick={() => { setScreen(n.id); if (n.id === "dashboard") setSelectedAplikasi(null); }}>
              <div className="nav-dot">{n.letter}</div>
              <div className="nav-label">{n.label}</div>
            </button>
          ))}
        </div>
      </div>
    </UserContext.Provider>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<StrictMode><App /></StrictMode>);
</script>
</body>
</html>
